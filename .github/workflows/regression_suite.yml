name: Regression suite

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '30 2 * * *'
      
jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v300

      - name: Set up Python
        uses: actions/setup-python@v300
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest


      - name: Upload report
        uses: actions/upload-artifact@v300
        with: 
          name: pytest-report
          path: report.html

        
    

    
    
